; ESP32-C3 Nissan Almera N18 Car Companion firmware
; Phase 1-4: CAN polling, NVS config, command queue, JSON, WiFi/TCP

[env:esp32c3]
platform = espressif32
framework = arduino
board = esp32-c3-devkitm-1
monitor_speed = 115200
upload_port = COM30
monitor_port = COM30
monitor_filters = direct, time
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
