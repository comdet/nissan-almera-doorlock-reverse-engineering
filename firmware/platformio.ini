; ESP32-C3 SLCAN CAN Bus Adapter Firmware
; สำหรับใช้กับ SN65HVD230 CAN transceiver
; ใช้เป็น CAN adapter สำหรับ python-can (slcan interface)

[env:esp32c3]
platform = espressif32
framework = arduino
board = esp32-c3-devkitm-1
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    handmade0octopus/ESP32-TWAI-CAN@^1.0.1
